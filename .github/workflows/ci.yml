name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      virtual_scroll_stress:
        description: Run virtual-scroll stress e2e
        type: boolean
        default: false

jobs:
  test:
    name: Lint, Typecheck & Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node_version: ['lts/*']
        include:
          - os: macos-latest
            node_version: 'lts/*'
          - os: windows-latest
            node_version: 'lts/*'
      fail-fast: false
    env:
      CI: true
    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.33.4 --activate

      - name: Set node ${{ matrix.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          cache: pnpm

      - name: Setup
        run: npm i -g @antfu/ni

      - name: Install
        run: nci

      - name: Lint (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm lint

      - name: Typecheck
        run: nr typecheck

      - name: Run tests
        run: pnpm run build:parser && pnpm run build:core && nr test -- --run

      - name: Run SSR check
        run: nr check:ssr

      - name: Vue2 CJS smoke (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run test:smoke:vue2-cjs

      - name: Build (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run build:parser && pnpm build

      - name: Build playground deploy target (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm play:deploy:check

      - name: Virtual scroll playground e2e (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run test:e2e:virtual-scroll:ci

      - name: Virtual scroll playground stress e2e (scheduled/manual, Ubuntu only)
        if: >
          matrix.os == 'ubuntu-latest' &&
          (
            github.event_name == 'schedule' ||
            (github.event_name == 'workflow_dispatch' && inputs.virtual_scroll_stress)
          )
        run: pnpm run test:e2e:virtual-scroll:ci:stress

      - name: Upload virtual scroll e2e diagnostics
        if: failure() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: virtual-scroll-e2e-diagnostics-${{ matrix.os }}
          path: |
            virtual-scroll-failure.png
            virtual-scroll-failure.json
          if-no-files-found: ignore

      - name: Minimal install smoke (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: MARKSTREAM_SMOKE_SKIP_BUILD=1 pnpm test:smoke:minimal

      - name: Packed smoke with optional peers (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: MARKSTREAM_SMOKE_SKIP_BUILD=1 pnpm test:smoke:pack:optional

      - name: Check package size budget (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm size:check
